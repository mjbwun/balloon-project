<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ===== Page Title (Browser Tab) ===== -->
  <title>Balloon Party 🎈</title>

  <style>
    /* ===== MAIN PAGE / BODY STYLING ===== */
    body {
      margin: 0;                     /* Removes default spacing */
      height: 100vh;                /* Full screen height */
      overflow: hidden;             /* Prevent scrollbars */
      cursor: pointer;              /* Cursor becomes pointer */
      transition: background 1s linear; /* Smooth background change */
    }

    /* ===== BALLOON MAIN SHAPE ===== */
    .balloon {
      position: absolute;           /* Allows free positioning */
      width: 60px;
      height: 80px;
      border-radius: 50% 50% 45% 45%; /* Makes oval balloon shape */
      animation: floatUp 4s ease-out forwards; /* Floating animation */
    }

    /* ===== BALLOON SHINE (3D EFFECT) ===== */
    .balloon::before {
      content: "";                  /* Required for pseudo element */
      position: absolute;
      top: 10px;
      left: 15px;
      width: 15px;
      height: 25px;
      background: rgba(255,255,255,0.5); /* Light reflection */
      border-radius: 50%;
      transform: rotate(20deg);     /* Slight angle for realism */
    }

    /* ===== BALLOON STRING ===== */
    .balloon::after {
      content: "";
      position: absolute;
      bottom: -40px;               /* Places string under balloon */
      left: 50%;
      width: 2px;
      height: 40px;
      background: #333;            /* Dark string color */
      transform: translateX(-50%);
    }

    /* ===== FLOATING ANIMATION ===== */
    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1); /* Start position */
        opacity: 1;
      }
      100% {
        transform: translateY(-400px) scale(1.1); /* Move up */
        opacity: 0; /* Fade out */
      }
    }
  </style>
</head>

<body>

<script>
  // ===== BACKGROUND COLOR SYSTEM (RAINBOW LOOP) =====

  let hue = 0; // Starting color value

  setInterval(() => {
    // Changes background using HSL (smooth rainbow)
    document.body.style.background = `hsl(${hue}, 100%, 70%)`;

    hue += 10; // Speed of color change (increase = faster)
  }, 1000); // Runs every 1 second


  // ===== CLICK EVENT (CREATE BALLOONS) =====

  document.addEventListener("click", (e) => {

    // ---- Create balloon element ----
    const balloon = document.createElement("div");

    // ---- Add balloon class (styling) ----
    balloon.classList.add("balloon");


    // ===== POSITION (WHERE YOU CLICK) =====
    balloon.style.left = e.clientX + "px"; // X position
    balloon.style.top = e.clientY + "px";  // Y position


    // ===== RANDOM COLOR GENERATOR =====
    const randomHue = Math.floor(Math.random() * 360);

    // 3D gradient color (light → main color)
    balloon.style.background =
      `radial-gradient(circle at 30% 30%, white, hsl(${randomHue}, 100%, 50%))`;


    // ===== ADD BALLOON TO SCREEN =====
    document.body.appendChild(balloon);


    // ===== REMOVE AFTER ANIMATION =====
    setTimeout(() => {
      balloon.remove(); // Deletes balloon after floating
    }, 4000);

  });

</script>

</body>
</html>
